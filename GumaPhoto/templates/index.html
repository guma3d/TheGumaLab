<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GumaPhoto - AI Family Semantic Search</title>
    <meta name="description" content="Automatically search family photos using AI and natural language.">

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="glass-container">
        <header>
            <div class="logo">
                <h1>GumaPhoto</h1>
            </div>
            <p>AI Family Photo Semantic Search</p>
        </header>

        <main>
            <form id="search-form">
                <div class="input-group">
                    <input type="text" id="search-query" placeholder="Ask anything... ('비 오는 날 웃고 있는 아빠 사진')" required autocomplete="off">
                    <button type="submit" id="submit-btn">
                        <span class="btn-text">Search</span>
                        <div class="loader" style="display: none;"></div>
                    </button>
                </div>
            </form>

            <!-- 결과 화면이 나타날 위치 -->
            <div id="result-container" class="result-container hidden">
                <h3 class="result-title">Documents Found! 🎊</h3>
                <p class="result-msg">Your images will be displayed here.</p>
            </div>
        </main>
    </div>

    <!-- Custom Logic -->
    <script src="/static/script.js"></script>
</body>

</html>
