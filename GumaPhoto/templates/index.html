<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GumaPhoto - AI Family Semantic Search</title>
    <meta name="description" content="AI-powered semantic search for family photos.">

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="static/style.css?v=6">
</head>

<body>

    <div class="main-layout">
        <header class="top-header">
            <div class="logo">
                <h1>GumaPhoto</h1>
                <p>AI Private Gallery</p>
            </div>
            
            <form id="search-form" class="search-form">
                <div class="input-group">
                    <input type="text" id="search-query" placeholder="Ask anything... ('비 오는 날 엄마 사진')" required autocomplete="off">
                    <button type="submit" id="submit-btn">
                        <span class="btn-text"><i class="fa-solid fa-magnifying-glass"></i></span>
                        <div class="loader" style="display: none;"></div>
                    </button>
                </div>
            </form>

            <div class="header-actions">
                <input type="file" id="upload-input" multiple accept="image/*" style="display: none;">
                <label for="upload-input" id="upload-btn" class="secondary-btn" title="Upload Photos">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                </label>
            </div>
        </header>
        
        <!-- Upload Progress (Hidden by default) -->
        <div id="upload-progress-container" class="hidden">
            <div class="progress-info">
                <span id="progress-text">0 / 0 uploaded</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-bar-fill" class="progress-bar-fill"></div>
            </div>
        </div>

        <main class="gallery-main">
            <!-- Results Metadata -->
            <div id="search-meta" class="search-meta hidden">
                <p id="meta-text"></p>
            </div>

            <!-- Gallery Grid -->
            <div id="gallery-grid" class="gallery-grid">
                <!-- Image cards will be injected here via JS -->
            </div>
        </main>
    </div>

    <!-- Floating Action Bar (FAB) for Download -->
    <div id="selection-fab" class="selection-fab hidden">
        <div class="fab-content">
            <span id="selection-count">0 Selected</span>
            <button id="download-btn" class="download-btn">
                <i class="fa-solid fa-download"></i> Download
            </button>
            <button id="cancel-selection-btn" class="cancel-btn">Cancel</button>
        </div>
    </div>

    <script src="static/script.js?v=6"></script>
</body>

</html>
