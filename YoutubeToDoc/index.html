<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YoutubeToDoc - AI 가공 텍스트 요약</title>
    <meta name="description" content="Youtube 비디오를 깔끔하고 완성도 높은 문서로 자동 변환합니다.">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Background Animated Shapes -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="glass-container">
        <header>
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd"
                        d="M20 4H4C2.89543 4 2 4.89543 2 6V18C2 19.1046 2.89543 20 4 20H20C21.1046 20 22 19.1046 22 18V6C22 4.89543 21.1046 4 20 4ZM8 15V9L15 12L8 15Z"
                        fill="url(#paint0_linear)" />
                    <defs>
                        <linearGradient id="paint0_linear" x1="2" y1="4" x2="22" y2="20" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#FF2A5F" />
                            <stop offset="1" stop-color="#FF6A88" />
                        </linearGradient>
                    </defs>
                </svg>
                <h1>Youtube<span class="highlight">ToDoc</span></h1>
            </div>
            <p>유튜브 영상을 프리미엄 문서로 깔끔하게 요약·정리해 드립니다.</p>
        </header>

        <main>
            <form id="url-form">
                <div class="input-group">
                    <input type="url" id="youtube-url" placeholder="유튜브 링크를 여기에 붙여넣으세요" required autocomplete="off">
                    <button type="submit" id="submit-btn">
                        <span class="btn-text">문서로 변환</span>
                        <div class="loader" style="display: none;"></div>
                    </button>
                </div>
            </form>

            <div id="status-container" class="status-container hidden">
                <div class="progress-wrapper">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
                <div class="status-detail">
                    <span id="status-text">준비 중...</span>
                    <span id="progress-percent" class="percent">0%</span>
                </div>
            </div>

            <!-- 결과 화면이 나타날 위치 -->
            <div id="result-container" class="result-container hidden">
                <h3 class="result-title">문서 생성 완료! 🎊</h3>
                <p class="result-msg">문서가 성공적으로 준비되었습니다.</p>
            </div>
            <!-- History Section -->
            <div id="history-section" style="margin-top: 60px; text-align: left; opacity: 1;">
                <h3
                    style="margin-bottom: 20px; font-weight: 600; color: #fff; font-size: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">
                    <i class="fa-solid fa-clock-rotate-left" style="margin-right: 8px;"></i>완성된 문서 기록
                </h3>
                <div id="tasks-grid" class="tasks-grid">
                    <!-- Task cards will be loaded here via JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Custom Logic -->
    <script src="script.js"></script>
</body>

</html>
