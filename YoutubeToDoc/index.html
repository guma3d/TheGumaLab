<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YoutubeToDoc - AI Summarization</title>
    <meta name="description" content="Automatically summarize and translate YouTube videos into high-quality documents.">

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="glass-container">
        <header>
            <div class="logo">
                <h1>YoutubeToDoc</h1>
            </div>
            <p>Summarize and translate YouTube videos.</p>
        </header>

        <main>
            <form id="url-form">
                <div class="input-group">
                    <input type="url" id="youtube-url" placeholder="Paste your YouTube link here" required autocomplete="off">
                    <button type="submit" id="submit-btn">
                        <span class="btn-text">Convert</span>
                        <div class="loader" style="display: none;"></div>
                    </button>
                </div>
            </form>

            <div id="status-container" class="status-container hidden">
                <div class="progress-wrapper">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
                <div class="status-detail">
                    <span id="status-text">Ready...</span>
                    <span id="progress-percent" class="percent">0%</span>
                </div>
            </div>

            <!-- 결과 화면이 나타날 위치 -->
            <div id="result-container" class="result-container hidden">
                <h3 class="result-title">Document Created! 🎊</h3>
                <p class="result-msg">Your document is ready.</p>
            </div>
            <!-- Active Tasks Section -->
            <div id="active-tasks-section" style="margin-top: 40px; text-align: left; display: none;">
                <h3 class="metric-title"
                    style="margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; align-items: center;">
                    <i class="fa-solid fa-spinner fa-spin" style="color: var(--primary); margin-right: 8px;"></i>In Progress / Queued
                </h3>
                <div id="active-tasks-list" class="active-tasks-list">
                    <!-- Active task items will be loaded here via JS -->
                </div>
            </div>

            <!-- History Section -->
            <div id="history-section" style="margin-top: 60px; text-align: left; opacity: 1;">
                <h3 class="metric-title"
                    style="margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; align-items: center; justify-content: space-between;">
                    <div><i class="fa-solid fa-clock-rotate-left" style="color: var(--primary); margin-right: 8px;"></i>Completed Documents</div>
                    <div style="display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 4px 10px; background: rgba(0,0,0,0.2);">
                        <input type="text" id="document-search-input" placeholder="Search Completed..." style="background: transparent; border: none; color: white; outline: none; font-size: 0.85em; width: 150px;">
                        <i class="fa-solid fa-magnifying-glass" id="document-search-btn" style="color: var(--primary); cursor: pointer; margin-left: 5px;"></i>
                    </div>
                </h3>
                <div id="tasks-grid" class="tasks-grid">
                    <!-- Task cards will be loaded here via JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Custom Logic -->
    <script src="script.js"></script>
</body>

</html>
