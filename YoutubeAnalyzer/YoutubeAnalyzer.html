<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YoutubeAnalyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --accent-color: #10b981;
            /* 녹색 */
            --warning-color: #f59e0b;
            /* 노란색 */
            --danger-color: #ef4444;
            /* 빨간색 */
            --text-muted: #a1a1aa;
            --input-bg: rgba(0, 0, 0, 0.3);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-wrapper {
            width: 100%;
            max-width: 1000px;
            /* 정렬을 위해 너비 증가 */
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin: 0 auto;
        }

        /* 카드 스타일 (ServerStatus .container와 유사) */
        .card {
            width: 100%;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
        }

        /* 입력 컨트롤 */
        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.8rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        label i {
            margin-right: 0.5rem;
            color: var(--accent-color);
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.1);
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
            opacity: 0.5;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--text-main);
            border: none;
            border-radius: 10px;
            color: #000;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            background: var(--accent-color);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.2);
        }

        button:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 미리보기 */
        #previewContainer {
            display: none;
            margin-top: 1.5rem;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            text-align: center;
        }

        #previewContainer img {
            width: 50%;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        /* 진행률 바 */
        .progress-container {
            margin-top: 2rem;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .bar-bg {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            background: var(--accent-color);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
        }

        /* 로그 터미널 */
        .log-terminal {
            margin-top: 1.5rem;
            background: #000;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1rem;
            height: 120px;
            overflow-y: hidden;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            color: var(--accent-color);
        }

        .log-line {
            margin-bottom: 4px;
            opacity: 0.7;
        }

        .log-line:last-child {
            opacity: 1;
            font-weight: 600;
        }

        .log-line::before {
            content: '> ';
            color: var(--text-muted);
        }

        /* 스크립트 목록 그리드 */
        .section-title {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .scripts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        .script-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .script-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .script-thumb {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-bottom: 1px solid var(--border-color);
        }

        .script-content {
            padding: 1rem;
        }

        .script-title {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .script-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* 결과 영역 */
        .result {
            display: none;
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--accent-color);
            border-radius: 10px;
        }

        .result.show {
            display: block;
        }

        .result.error {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--danger-color);
        }

        .result h3 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .result-link {
            display: inline-block;
            margin-top: 1rem;
            padding: 8px 20px;
            background: var(--accent-color);
            color: #fff;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .result-link:hover {
            background: #059669;
        }

        /* 빈 상태 */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 10px;
            }

            .card {
                padding: 1.5rem;
            }

            .main-wrapper {
                gap: 1.5rem;
            }

            input[type="text"] {
                padding: 12px 15px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <div class="main-wrapper">
        <!-- 입력 섹션 -->
        <div class="card">
            <div class="input-group">
                <label for="url"><i class="fa-brands fa-youtube"></i> Target URL</label>
                <input type="text" id="url" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off">
            </div>

            <button id="extractBtn" onclick="extract()">
                <span id="btnText">Run</span>
            </button>

            <!-- 미리보기 -->
            <div id="previewContainer">
                <img id="previewImage" src="" alt="Thumbnail">
            </div>

            <!-- 진행률 -->
            <div id="progressSection" style="display: none;">
                <div class="progress-container">
                    <div class="label-row">
                        <span id="progressText">Initializing...</span>
                        <span id="progressPercent">0%</span>
                    </div>
                    <div class="bar-bg">
                        <div class="bar-fill" id="progressBar"></div>
                    </div>
                </div>
            </div>

            <!-- 결과 -->
            <div id="result" class="result"></div>

            <!-- 로그 터미널 -->
            <div class="log-terminal" id="logTerminal">
                <div class="log-line">System ready...</div>
            </div>
        </div>

        <!-- 스크립트 섹션 -->
        <div>
            <div class="section-title">
                <i class="fa-solid fa-database"></i> Archive Database
            </div>
            <div id="scriptsGrid" class="scripts-grid">
                <!-- Scripts will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        let eventSource = null;

        window.addEventListener('DOMContentLoaded', () => {
            loadScripts();
            checkCurrentStatus();

            const urlInput = document.getElementById('url');
            urlInput.addEventListener('input', handleUrlInput);
            urlInput.addEventListener('paste', handleUrlInput);

            // Enter 키 입력 시 실행 허용
            urlInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') extract();
            });
        });

        function handleUrlInput(e) {
            setTimeout(() => {
                const url = e.target.value.trim();
                const videoId = extractVideoId(url);
                const previewContainer = document.getElementById('previewContainer');
                const previewImage = document.getElementById('previewImage');

                if (videoId) {
                    previewImage.src = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
                    previewImage.onerror = function () {
                        this.src = `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
                    };
                    previewContainer.style.display = 'block';
                } else {
                    previewContainer.style.display = 'none';
                }
            }, 10);
        }

        function extractVideoId(url) {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        async function checkCurrentStatus() {
            try {
                const response = await fetch('status');
                const data = await response.json();

                if (data.video_id && !data.completed) {
                    setLoadingState(true);

                    // 미리보기 표시
                    const previewContainer = document.getElementById('previewContainer');
                    const previewImage = document.getElementById('previewImage');
                    previewImage.src = `https://img.youtube.com/vi/${data.video_id}/maxresdefault.jpg`;
                    previewContainer.style.display = 'block';

                    updateProgress(data.progress, data.status);

                    if (eventSource) eventSource.close();
                    eventSource = new EventSource(`progress/${data.video_id}`);
                    setupEventSource(eventSource);
                }
            } catch (error) {
                console.error('Status check failed:', error);
            }
        }

        function setLoadingState(isLoading) {
            const btn = document.getElementById('extractBtn');
            const btnText = document.getElementById('btnText');
            const progressSection = document.getElementById('progressSection');
            const resultDiv = document.getElementById('result');

            if (isLoading) {
                btn.disabled = true;
                btnText.textContent = "Processing...";
                progressSection.style.display = 'block';
                resultDiv.classList.remove('show');
            } else {
                btn.disabled = false;
                btnText.textContent = "Run";
                // Don't hide progress immediately on success, keep it visible or handle in update
            }
        }

        async function extract() {
            const urlInput = document.getElementById('url');
            const url = urlInput.value.trim();
            const resultDiv = document.getElementById('result');

            if (!url) {
                showResult('error', 'Please provide a valid YouTube URL');
                return;
            }

            setLoadingState(true);
            addLog("Initiating extraction...");

            if (eventSource) eventSource.close();

            try {
                const response = await fetch('extract', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const data = await response.json();

                if (!data.success) {
                    showResult('error', data.message);
                    setLoadingState(false);
                    return;
                }

                addLog(`Target confirmed: ${data.video_id}`);

                eventSource = new EventSource(`progress/${data.video_id}`);
                setupEventSource(eventSource);

            } catch (error) {
                showResult('error', error.message);
                addLog(`Error: ${error.message}`);
                setLoadingState(false);
            }
        }

        function setupEventSource(es) {
            es.onmessage = function (event) {
                const data = JSON.parse(event.data);
                updateProgress(data.progress, data.status);

                if (data.completed) {
                    es.close();
                    setLoadingState(false);

                    if (data.error) {
                        showResult('error', data.error);
                    } else if (data.result) {
                        showSuccess(data.result);
                        setTimeout(loadScripts, 1000);
                    }
                }
            };

            es.onerror = function () {
                es.close();
                showResult('error', "Connection lost");
                addLog("Connection lost");
                setLoadingState(false);
            };
        }

        function updateProgress(percent, status) {
            const bar = document.getElementById('progressBar');
            const text = document.getElementById('progressText');
            const percentText = document.getElementById('progressPercent');

            if (bar) bar.style.width = `${percent}%`;
            if (text) text.textContent = status;
            if (percentText) percentText.textContent = `${percent}%`;

            addLog(status);
        }

        function showResult(type, message) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result show ${type}`;
            resultDiv.innerHTML = `<h3>${type === 'error' ? 'Error' : 'Success'}</h3><p>${message}</p>`;
        }

        function showSuccess(result) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result show';
            // Styling the success result cleaner without big image
            resultDiv.innerHTML = `
                <h3><i class="fa-solid fa-check-circle"></i> Extraction Complete</h3>
                <p>${result.title}</p>
                <div style="margin-top:10px;">
                    <a href="${result.scriptPath}" target="_blank" class="result-link">
                        <i class="fa-regular fa-file-lines"></i> Open Transcript
                    </a>
                </div>
            `;
        }

        // 로그 로직
        const logHistory = [];
        const MAX_LOGS = 5;

        function addLog(message) {
            const terminal = document.getElementById('logTerminal');
            if (logHistory.length > 0 && logHistory[logHistory.length - 1] === message) return;

            logHistory.push(message);
            if (logHistory.length > MAX_LOGS) logHistory.shift();

            terminal.innerHTML = logHistory.map(msg => `<div class="log-line">${msg}</div>`).join('');
        }

        async function loadScripts() {
            const grid = document.getElementById('scriptsGrid');
            try {
                const response = await fetch('scripts/list');
                const data = await response.json();

                if (data.success && data.scripts.length > 0) {
                    grid.className = 'scripts-grid';
                    grid.innerHTML = data.scripts.map(script => `
                        <a href="${script.script_url}" target="_blank" class="script-card">
                            <img src="${script.thumbnail}" class="script-thumb" alt="${script.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x140/000000/ffffff?text=No+Image'">
                            <div class="script-content">
                                <div class="script-title">${script.title}</div>
                                <div class="script-meta">
                                    <i class="fa-regular fa-clock"></i> ${new Date(script.created_at * 1000).toLocaleDateString()}
                                </div>
                            </div>
                        </a>
                    `).join('');
                } else {
                    grid.className = 'empty-state';
                    grid.innerHTML = `
                        <i class="fa-solid fa-box-open"></i>
                        <p>No transcripts found. Start by extracting a video.</p>
                    `;
                }
            } catch (error) {
                grid.innerHTML = `<p style="color:var(--danger-color); text-align:center;">Failed to load history</p>`;
            }
        }
    </script>
</body>

</html>
