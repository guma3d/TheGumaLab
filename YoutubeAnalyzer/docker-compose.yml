version: '3.8'

services:
  youtube-transcript-lab:
    build: .
    container_name: youtube-transcript-lab
    ports:
      - "8082:5000"
    volumes:
      - ./Scripts:/app/Scripts
      - ./Logs:/app/Logs
      - ./Temp_Audio:/app/Temp_Audio
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: [ "CMD", "python", "-c", "import requests; requests.get('http://localhost:5000')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
