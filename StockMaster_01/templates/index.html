<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Analyzer - Guma Lab</title>
    <!-- Use FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts for consistency -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 
         * Guma Lab - StockMaster_01
         * Premium Dark Theme, Glassmorphism, Neon Accents 
         */
        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --card-hover-bg: rgba(255, 255, 255, 0.07);
            --card-hover-border: rgba(255, 255, 255, 0.2);

            --primary-glow: #10b981;
            /* Indigo */
            --secondary-glow: #34d399;
            /* Pink */
            --accent-color: #10b981;
            /* Cyan */

            --positive-color: #10b981;
            /* Green */
            --negative-color: #ef4444;
            /* Red */

            --text-main: #ffffff;
            --text-muted: #a1a1aa;

            --transition-speed: 0.3s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding-bottom: 1rem;
        }

        /* Ambient Glows (from Portal) */
        .ambient-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            opacity: 0.15;
            filter: blur(80px);
            z-index: -1;
            top: -100px;
            left: 10%;
            animation: pulse 10s infinite alternate;
        }

        .ambient-glow-2 {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-color) 0%, transparent 70%);
            opacity: 0.12;
            filter: blur(80px);
            z-index: -1;
            bottom: -100px;
            right: 15%;
            animation: pulse 8s infinite alternate-reverse;
        }

        .ambient-glow-3 {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--secondary-glow) 0%, transparent 70%);
            opacity: 0.08;
            filter: blur(80px);
            z-index: -1;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            animation: pulse 12s infinite alternate;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.10;
            }

            100% {
                transform: scale(1.1);
                opacity: 0.18;
            }
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 1rem;
            z-index: 1;
        }

        /* Header Config */
        header {
            margin-bottom: 1.5rem;
            margin-top: 0.5rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .back-button {
            font-size: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: all var(--transition-speed) ease;
            padding: 0.5rem;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 50px;
            height: 50px;
        }

        .back-button:hover {
            color: var(--accent-color);
            background: var(--card-hover-bg);
            border-color: var(--accent-color);
            transform: scale(1.1) translateX(-3px);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.2rem;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        /* Base Card Style */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.2rem;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out backwards;
            transition: all var(--transition-speed) ease;
        }

        .card:hover {
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
            border-color: var(--card-hover-border);
        }

        .card h2 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card h2 i {
            color: var(--accent-color);
        }

        /* Grid Layout */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.2rem;
        }

        .panel-overview {
            grid-column: span 1;
        }

        .panel-watchlist {
            grid-column: span 1;
        }

        .panel-ai-insight {
            grid-column: span 2;
        }

        /* Market Indices */
        .market-indices {
            display: flex;
            flex-direction: column;
            margin-bottom: 0.5rem;
            gap: 0.3rem;
        }

        .index-item {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 0.8rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .index-name {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .index-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .index-change {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .positive .index-change,
        .positive .change {
            color: var(--positive-color);
        }

        .negative .index-change,
        .negative .change {
            color: var(--negative-color);
        }

        .card-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        /* Watchlist */
        .stock-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .stock-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.6rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            transition: background 0.2s ease;
            border: 1px solid transparent;
        }

        .stock-row:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .stock-info {
            display: flex;
            flex-direction: column;
        }

        .stock-ticker {
            font-weight: 600;
            font-size: 1.05rem;
        }

        .stock-company {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .stock-numbers {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .stock-numbers .price {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-main);
        }

        .stock-numbers .change {
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Watchlist Form */
        .watchlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .watchlist-header h2 {
            margin-bottom: 0;
        }

        .btn-add {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-add:hover {
            background: rgba(16, 185, 129, 0.1);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }

        .add-form-container {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--card-border);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: none;
            animation: fadeInDown 0.3s ease-out;
        }

        .add-form-container.active {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .add-form-container input {
            flex: 1;
            min-width: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: #fff;
            padding: 0.5rem;
            border-radius: 6px;
            font-family: 'Outfit', sans-serif;
        }

        .add-form-container input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .add-form-container button {
            background: linear-gradient(90deg, #10b981, #34d399);
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
        }

        .add-form-container button.btn-cancel {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
        }

        .btn-edit {
            background: transparent;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            font-size: 1rem;
            opacity: 0.5;
            transition: all 0.2s;
            padding-left: 1rem;
        }

        .btn-edit:hover {
            opacity: 1;
            transform: scale(1.1);
            color: var(--accent-color);
        }

        .btn-remove {
            background: transparent;
            border: none;
            color: var(--negative-color);
            cursor: pointer;
            font-size: 1rem;
            opacity: 0.5;
            transition: all 0.2s;
            padding-left: 0.75rem;
        }

        .btn-remove:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        /* Search Results Dropdown */
        .search-results {
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            margin-top: 0.5rem;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .search-results.active {
            display: flex;
        }

        .search-result-item {
            padding: 0.8rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .search-result-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .search-result-name {
            font-weight: 500;
            color: #fff;
        }

        .search-result-ticker {
            font-size: 0.8rem;
            color: var(--accent-color);
            background: rgba(16, 185, 129, 0.1);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }

        /* AI Panel */
        .insight-title {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .insight-text {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .insight-text strong {
            color: #fff;
        }

        .recommendation-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
        }

        .recommendation-box .label {
            color: var(--accent-color);
            font-weight: 600;
        }

        .recommendation-box .ticker {
            font-weight: 700;
            color: #fff;
            margin: 0 0.5rem;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel-overview {
            animation-delay: 0.1s;
        }

        .panel-watchlist {
            animation-delay: 0.2s;
        }

        .panel-ai-insight {
            animation-delay: 0.3s;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            .panel-overview,
            .panel-watchlist,
            .panel-ai-insight {
                grid-column: span 1;
            }

            .market-indices {
                flex-direction: column;
            }

            h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>

<body>
    <!-- Ambient glowing backgrounds matching the Portal -->
    <div class="ambient-glow"></div>
    <div class="ambient-glow-2"></div>
    <div class="ambient-glow-3"></div>

    <div class="container">
        <header>
            <div class="header-content" style="justify-content: center;">
                <div class="title-group" style="text-align: center;">
                    <h1>Stock Analyzer</h1>
                </div>
            </div>
        </header>

        <!-- Dynamic Dashboard Grid -->
        <main class="grid dashboard">
            <!-- Market Overview Card -->
            <div class="card panel-overview">
                <div class="status-dot"></div>
                <h2><i class="fa-solid fa-earth-americas"></i> Market Overview</h2>
                <div class="market-indices" id="market-indices-container">
                    <div style="color: var(--text-muted); text-align: center; width: 100%;">Loading market data...</div>
                    <!-- Dynamically populated by JS -->
                </div>
            </div>

            <!-- Portfolio Watchlist Card -->
            <div class="card panel-watchlist">
                <div class="watchlist-header">
                    <div style="display:flex; flex-direction:column; gap:0.25rem;">
                        <h2><i class="fa-solid fa-chart-pie"></i> My Portfolio</h2>
                        <div id="portfolio-totals"
                            style="font-size: 0.95rem; color: var(--accent-color); font-weight: 500;">
                            <!-- dynamically filled -->
                        </div>
                    </div>
                    <button class="btn-add" id="btn-toggle-add"><i class="fa-solid fa-plus"></i> Add</button>
                </div>

                <div class="add-form-container" id="add-form" style="flex-direction: column;">
                    <div style="display: flex; flex-direction: column; gap: 0.5rem; width: 100%;">
                        <input type="text" id="input-search" placeholder="Search company (e.g., 테슬라, Apple)..."
                            autocomplete="off" style="width: 100%; font-size: 1rem; padding: 0.75rem;">
                        <div style="display: flex; gap: 0.5rem; width: 100%;">
                            <button id="btn-search-stock" style="flex: 1; padding: 0.75rem;"><i
                                    class="fa-solid fa-magnifying-glass"></i> Search</button>
                            <button class="btn-cancel" id="btn-cancel-add"
                                style="flex: 1; padding: 0.75rem;">Cancel</button>
                        </div>
                    </div>
                    <div class="search-results" id="search-results-container">
                        <!-- Search results will appear here -->
                    </div>
                </div>

                <div class="stock-list" id="watchlist-container">
                    <!-- Dynamically populated by JS -->
                    <div style="color: var(--text-muted); text-align: center; padding: 1rem;">Loading portfolio data...
                    </div>
                </div>
            </div>

            <!-- AI News & Insight Card (Wide) -->
            <div class="card panel-ai-insight">
                <h2><i class="fa-solid fa-wand-magic-sparkles"></i> Portfolio Analysis</h2>
                <div id="portfolio-analysis-container">
                    <div style="color: var(--text-muted); text-align: center; padding: 2rem;">
                        <i class="fa-solid fa-spinner fa-spin"
                            style="font-size: 2rem; margin-bottom: 1rem; color: var(--accent-color);"></i>
                        <br>AI is analyzing your portfolio...
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function formatNumberWithDot(num) {
            if (num === "N/A" || num === "Error") return num;
            let parts = num.toString().split(".");
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            return parts.join(".");
        }

        document.addEventListener('DOMContentLoaded', () => {
            console.log('StockMaster UI Loaded');

            // Add gentle 3D hover effects to cards matching the Portal style
            const cards = document.querySelectorAll('.card');

            cards.forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;

                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;

                    const rotateX = ((y - centerY) / centerY) * -3;
                    const rotateY = ((x - centerX) / centerX) * 3;

                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.01)`;
                    card.style.transition = 'none'; // remove transition for smooth tracking
                });

                card.addEventListener('mouseleave', () => {
                    card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1)';
                    card.style.transition = 'all 0.4s ease'; // restore transition when leaving
                });
            });

            // Polling data functionality
            async function fetchMarketData() {
                try {
                    const res = await fetch(`/StockMaster_01/api/market-indices?t=${new Date().getTime()}`);
                    const data = await res.json();

                    const container = document.getElementById('market-indices-container');
                    container.innerHTML = ''; // clear

                    data.forEach(item => {
                        const isUpStr = item.is_up ? 'positive' : 'negative';
                        const signStr = item.is_up ? '+' : '';
                        const iconStr = item.is_up ? 'fa-arrow-trend-up' : 'fa-arrow-trend-down';
                        const changeStr = item.price === "N/A" || item.price === "Error" ? 'N/A' : `${signStr}${item.change}% <i class="fa-solid ${iconStr}"></i>`;
                        const priceStr = item.price === "N/A" || item.price === "Error" ? item.price : `${formatNumberWithDot(item.price)}`;

                        container.innerHTML += `
                            <div class="stock-row" style="padding: 0.4rem 0.6rem;">
                                <div class="stock-info" style="flex: 1;">
                                    <span class="stock-ticker" style="color: var(--text-main); font-size: 1rem;">${item.name}</span>
                                </div>
                                <div style="display: flex; align-items: center;">
                                    <div class="stock-numbers ${isUpStr}" style="flex-direction: row; gap: 0.75rem; align-items: center;">
                                        <span class="price" style="font-size: 1rem;">${priceStr}</span>
                                        <span class="change" style="font-size: 1rem;">${changeStr}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                } catch (e) {
                    console.error("Failed to fetch market data", e);
                }
            }

            async function fetchWatchlistData() {
                try {
                    const res = await fetch(`/StockMaster_01/api/watchlist?t=${new Date().getTime()}`);
                    const data = await res.json();

                    const container = document.getElementById('watchlist-container');
                    container.innerHTML = ''; // clear

                    let totalKrw = 0;
                    let totalUsd = 0;

                    data.forEach(item => {
                        const isUpStr = item.is_up ? 'positive' : 'negative';
                        const signStr = item.is_up ? '+' : '';
                        const iconStr = item.is_up ? 'fa-arrow-trend-up' : 'fa-arrow-trend-down';
                        const changeStr = item.price === "N/A" || item.price === "Error" ? 'N/A' : `${signStr}${item.change}% <i class="fa-solid ${iconStr}"></i>`;
                        const priceStr = item.price === "N/A" || item.price === "Error" ? item.price : `${item.currency}${formatNumberWithDot(item.price)}`;

                        const shares = item.shares || 0;
                        const totalValStr = shares > 0 && item.total_value ? `<div style="font-size:0.85rem; color:var(--accent-color); margin-top:0.15rem;">보유: ${formatNumberWithDot(shares)}주 (${item.currency}${formatNumberWithDot(item.total_value)})</div>` : '';

                        if (item.currency === '₩' && item.total_value) totalKrw += item.total_value;
                        else if (item.currency === '$' && item.total_value) totalUsd += item.total_value;

                        container.innerHTML += `
                            <div class="stock-row">
                                <div class="stock-info">
                                    <span class="stock-ticker">${item.name}</span>
                                    ${totalValStr}
                                </div>
                                <div style="display: flex; align-items: center;">
                                    <div class="stock-numbers ${isUpStr}">
                                        <span class="price">${priceStr}</span>
                                        <span class="change">${changeStr}</span>
                                    </div>
                                    <button class="btn-edit" onclick="editStockShares('${item.raw_ticker}', '${item.name}', ${shares})" title="Edit Shares"><i class="fa-solid fa-pen"></i></button>
                                    <button class="btn-remove" onclick="removeStock('${item.raw_ticker}')" title="Remove"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            </div>
                        `;
                    });

                    document.getElementById('portfolio-totals').innerHTML = `총 자산: ₩${formatNumberWithDot(totalKrw)} + $${formatNumberWithDot(totalUsd)}`;
                } catch (e) {
                    console.error("Failed to fetch watchlist data", e);
                }
            }

            async function fetchPortfolioAnalysis() {
                try {
                    const container = document.getElementById('portfolio-analysis-container');

                    const res = await fetch(`/StockMaster_01/api/portfolio-analysis?t=${new Date().getTime()}`);
                    const data = await res.json();

                    if (data.success) {
                        let htmlContent = data.analysis.replace(/\[Current Portfolio Status\]/gi, '<h3 class="insight-title">Current Portfolio Status</h3>');
                        htmlContent = htmlContent.replace(/\[Market News & Portfolio Direction\]/gi, '<h3 class="insight-title" style="margin-top: 1.5rem;">Market News & Portfolio Direction</h3>');
                        htmlContent = htmlContent.replace(/\[Recommended Modifications\]/gi, '<h3 class="insight-title" style="margin-top: 1.5rem;">Recommended Modifications</h3>');
                        htmlContent = htmlContent.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                        htmlContent = htmlContent.replace(/\n\n/g, '</p><p class="insight-text" style="color: var(--text-main); margin-bottom: 0.5rem;">');
                        htmlContent = htmlContent.replace(/\n/g, '<br>');

                        container.innerHTML = `
                            <div class="insight-text" style="color: var(--text-main); margin-top: 0;">${htmlContent}</div>
                        `;
                    } else if (data.error) {
                        container.innerHTML = `
                            <p class="insight-text" style="color: var(--negative-color);">Error: ${data.error}</p>
                        `;
                    }
                } catch (e) {
                    console.error("Failed to fetch portfolio analysis", e);
                }
            }

            // Initialization and setup interval
            fetchMarketData();
            fetchWatchlistData();
            fetchPortfolioAnalysis();
            setInterval(() => {
                fetchMarketData();
                fetchWatchlistData();
                fetchPortfolioAnalysis();
            }, 300000); // 5 minute refresh period

            // Watchlist Add/Remove interactions
            const addForm = document.getElementById('add-form');
            const searchInput = document.getElementById('input-search');
            const searchBtn = document.getElementById('btn-search-stock');
            const searchResultsContainer = document.getElementById('search-results-container');

            document.getElementById('btn-toggle-add').addEventListener('click', () => {
                addForm.classList.toggle('active');
                if (addForm.classList.contains('active')) {
                    searchInput.focus();
                }
            });

            document.getElementById('btn-cancel-add').addEventListener('click', () => {
                addForm.classList.remove('active');
                searchInput.value = '';
                searchResultsContainer.classList.remove('active');
                searchResultsContainer.innerHTML = '';
            });

            searchBtn.addEventListener('click', async () => {
                const query = searchInput.value;
                if (!query) {
                    alert('Please enter a search term.');
                    return;
                }

                searchBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
                searchBtn.disabled = true;
                searchResultsContainer.classList.add('active');
                searchResultsContainer.innerHTML = '<div style="padding: 1rem; text-align: center; color: var(--text-muted);">Searching with AI...</div>';

                try {
                    const res = await fetch('/StockMaster_01/api/search-stock', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query })
                    });
                    const data = await res.json();

                    searchBtn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> Search';
                    searchBtn.disabled = false;

                    if (data.success && data.results.length > 0) {
                        searchResultsContainer.innerHTML = '';
                        data.results.forEach(stock => {
                            const item = document.createElement('div');
                            item.className = 'search-result-item';
                            item.innerHTML = `
                                <span class="search-result-name">${stock.name}</span>
                                <span class="search-result-ticker">${stock.ticker}</span>
                            `;
                            item.addEventListener('click', () => {
                                addStockToWatchlist(stock.ticker, stock.name);
                            });
                            searchResultsContainer.appendChild(item);
                        });
                    } else if (data.success && data.results.length === 0) {
                        searchResultsContainer.innerHTML = '<div style="padding: 1rem; text-align: center; color: var(--text-muted);">No results found.</div>';
                    } else {
                        searchResultsContainer.innerHTML = `<div style="padding: 1rem; text-align: center; color: var(--negative-color);">Error: ${data.error}</div>`;
                    }
                } catch (e) {
                    console.error("Search API failed", e);
                    searchBtn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> Search';
                    searchBtn.disabled = false;
                    searchResultsContainer.innerHTML = '<div style="padding: 1rem; text-align: center; color: var(--negative-color);">Network error occurred.</div>';
                }
            });

            // Allow Enter key to trigger search
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    searchBtn.click();
                }
            });

            async function addStockToWatchlist(ticker, name) {
                const sharesStr = prompt('Enter quantity:', "1");
                if (sharesStr === null) return;
                const shares = parseFloat(sharesStr) || 1;

                try {
                    searchResultsContainer.innerHTML = '<div style="padding: 1rem; text-align: center; color: var(--text-muted);">Adding to portfolio...</div>';
                    const res = await fetch('/StockMaster_01/api/watchlist', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ticker, name, shares })
                    });
                    const data = await res.json();
                    if (data.success) {
                        addForm.classList.remove('active');
                        searchInput.value = '';
                        searchResultsContainer.classList.remove('active');
                        searchResultsContainer.innerHTML = '';

                        document.getElementById('watchlist-container').innerHTML = '<div style="color: var(--text-muted); text-align: center; padding: 1rem;">Updating...</div>';
                        fetchWatchlistData();
                        fetchPortfolioAnalysis(); // Re-analyze on new stock added
                    } else {
                        alert('Error: ' + data.error);
                        searchResultsContainer.innerHTML = '';
                    }
                } catch (e) {
                    console.error("Failed to add stock", e);
                    alert("Failed to add stock.");
                }
            }

            window.editStockShares = async function (rawTicker, name, currentShares) {
                const sharesStr = prompt('Enter quantity:', currentShares);
                if (sharesStr === null) return;
                const shares = parseFloat(sharesStr) || 0;

                try {
                    document.getElementById('watchlist-container').innerHTML = '<div style="color: var(--text-muted); text-align: center; padding: 1rem;">Updating...</div>';
                    const res = await fetch('/StockMaster_01/api/watchlist', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ticker: rawTicker, name: name, shares: shares })
                    });
                    const data = await res.json();
                    if (data.success) {
                        fetchWatchlistData();
                        fetchPortfolioAnalysis();
                    } else {
                        alert('Error: ' + data.error);
                        fetchWatchlistData();
                    }
                } catch (e) {
                    console.error("Failed to update stock", e);
                    alert("Failed to update stock.");
                    fetchWatchlistData();
                }
            };

            window.removeStock = async function (rawTicker) {
                if (!confirm("Are you sure you want to remove this stock?")) return;

                try {
                    const res = await fetch(`/StockMaster_01/api/watchlist/${rawTicker}`, { method: 'DELETE' });
                    const data = await res.json();
                    if (data.success) {
                        document.getElementById('watchlist-container').innerHTML = '<div style="color: var(--text-muted); text-align: center; padding: 1rem;">Updating...</div>';
                        fetchWatchlistData();
                        fetchPortfolioAnalysis(); // Re-analyze after removal
                    }
                } catch (e) {
                    console.error("Failed to remove stock", e);
                }
            };
        });
    </script>
</body>

</html>
