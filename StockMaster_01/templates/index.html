<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockMaster - Guma Lab</title>
    <!-- Use FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts for consistency -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 
         * Guma Lab - StockMaster_01
         * Premium Dark Theme, Glassmorphism, Neon Accents 
         */
        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --card-hover-bg: rgba(255, 255, 255, 0.07);
            --card-hover-border: rgba(255, 255, 255, 0.2);

            --primary-glow: #6366f1;
            /* Indigo */
            --secondary-glow: #ec4899;
            /* Pink */
            --accent-color: #00f0ff;
            /* Cyan */

            --positive-color: #10b981;
            /* Green */
            --negative-color: #ef4444;
            /* Red */

            --text-main: #ffffff;
            --text-muted: #a1a1aa;

            --transition-speed: 0.3s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding-bottom: 3rem;
        }

        /* Ambient Glows (from Portal) */
        .ambient-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            opacity: 0.15;
            filter: blur(80px);
            z-index: -1;
            top: -100px;
            left: 10%;
            animation: pulse 10s infinite alternate;
        }

        .ambient-glow-2 {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-color) 0%, transparent 70%);
            opacity: 0.12;
            filter: blur(80px);
            z-index: -1;
            bottom: -100px;
            right: 15%;
            animation: pulse 8s infinite alternate-reverse;
        }

        .ambient-glow-3 {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--secondary-glow) 0%, transparent 70%);
            opacity: 0.08;
            filter: blur(80px);
            z-index: -1;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            animation: pulse 12s infinite alternate;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.10;
            }

            100% {
                transform: scale(1.1);
                opacity: 0.18;
            }
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            z-index: 1;
        }

        /* Header Config */
        header {
            margin-bottom: 3rem;
            margin-top: 1rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .back-button {
            font-size: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: all var(--transition-speed) ease;
            padding: 0.5rem;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 50px;
            height: 50px;
        }

        .back-button:hover {
            color: var(--accent-color);
            background: var(--card-hover-bg);
            border-color: var(--accent-color);
            transform: scale(1.1) translateX(-3px);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.2rem;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        /* Base Card Style */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out backwards;
            transition: all var(--transition-speed) ease;
        }

        .card:hover {
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
            border-color: var(--card-hover-border);
        }

        .card h2 {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card h2 i {
            color: var(--accent-color);
        }

        /* Grid Layout */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
        }

        .panel-overview {
            grid-column: span 1;
        }

        .panel-watchlist {
            grid-column: span 1;
        }

        .panel-ai-insight {
            grid-column: span 2;
        }

        /* Market Indices */
        .market-indices {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            gap: 1rem;
        }

        .index-item {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .index-name {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .index-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .index-change {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .positive .index-change,
        .positive .change {
            color: var(--positive-color);
        }

        .negative .index-change,
        .negative .change {
            color: var(--negative-color);
        }

        .card-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        /* Watchlist */
        .stock-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .stock-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            transition: background 0.2s ease;
            border: 1px solid transparent;
        }

        .stock-row:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .stock-info {
            display: flex;
            flex-direction: column;
        }

        .stock-ticker {
            font-weight: 600;
            font-size: 1.2rem;
        }

        .stock-company {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .stock-numbers {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .stock-numbers .price {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-main);
        }

        .stock-numbers .change {
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Watchlist Form */
        .watchlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .watchlist-header h2 {
            margin-bottom: 0;
        }

        .btn-add {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-add:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .add-form-container {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--card-border);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: none;
            animation: fadeInDown 0.3s ease-out;
        }

        .add-form-container.active {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .add-form-container input {
            flex: 1;
            min-width: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: #fff;
            padding: 0.5rem;
            border-radius: 6px;
            font-family: 'Outfit', sans-serif;
        }

        .add-form-container input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .add-form-container button {
            background: linear-gradient(90deg, #6366f1, #00f0ff);
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
        }

        .add-form-container button.btn-cancel {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
        }

        .btn-remove {
            background: transparent;
            border: none;
            color: var(--negative-color);
            cursor: pointer;
            font-size: 1rem;
            opacity: 0.5;
            transition: all 0.2s;
            padding-left: 1rem;
        }

        .btn-remove:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        /* AI Panel */
        .insight-content {
            background: rgba(0, 240, 255, 0.03);
            border: 1px solid rgba(0, 240, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
        }

        .ai-pill {
            position: absolute;
            top: -10px;
            right: 20px;
            background: linear-gradient(90deg, #6366f1, #00f0ff);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.75rem;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
        }

        .insight-title {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .insight-text {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .insight-text strong {
            color: #fff;
        }

        .recommendation-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
        }

        .recommendation-box .label {
            color: var(--accent-color);
            font-weight: 600;
        }

        .recommendation-box .ticker {
            font-weight: 700;
            color: #fff;
            margin: 0 0.5rem;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel-overview {
            animation-delay: 0.1s;
        }

        .panel-watchlist {
            animation-delay: 0.2s;
        }

        .panel-ai-insight {
            animation-delay: 0.3s;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            .panel-overview,
            .panel-watchlist,
            .panel-ai-insight {
                grid-column: span 1;
            }

            .market-indices {
                flex-direction: column;
            }

            h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>

<body>
    <!-- Ambient glowing backgrounds matching the Portal -->
    <div class="ambient-glow"></div>
    <div class="ambient-glow-2"></div>
    <div class="ambient-glow-3"></div>

    <div class="container">
        <header>
            <div class="header-content" style="justify-content: center;">
                <div class="title-group" style="text-align: center;">
                    <h1>StockMaster</h1>
                    <p class="subtitle">AI-Powered Personalized Portfolio & Trend Analysis</p>
                </div>
            </div>
        </header>

        <!-- Dynamic Dashboard Grid -->
        <main class="grid dashboard">
            <!-- Market Overview Card -->
            <div class="card panel-overview">
                <div class="status-dot"></div>
                <h2><i class="fa-solid fa-earth-americas"></i> Market Overview</h2>
                <div class="market-indices" id="market-indices-container">
                    <div style="color: var(--text-muted); text-align: center; width: 100%;">Loading market data...</div>
                    <!-- Dynamically populated by JS -->
                </div>
                <p class="card-desc">Real-time macro indicators showing overall market temperature.</p>
            </div>

            <!-- Portfolio Watchlist Card -->
            <div class="card panel-watchlist">
                <div class="watchlist-header">
                    <h2><i class="fa-solid fa-star"></i> My Watchlist</h2>
                    <button class="btn-add" id="btn-toggle-add"><i class="fa-solid fa-plus"></i> Add</button>
                </div>

                <div class="add-form-container" id="add-form">
                    <input type="text" id="input-ticker" placeholder="Ticker (e.g. TSLA, 005930.KS)">
                    <input type="text" id="input-name" placeholder="Company Name">
                    <button id="btn-save-stock">Save</button>
                    <button class="btn-cancel" id="btn-cancel-add">Cancel</button>
                </div>

                <div class="stock-list" id="watchlist-container">
                    <!-- Dynamically populated by JS -->
                    <div style="color: var(--text-muted); text-align: center; padding: 1rem;">Loading portfolio data...
                    </div>
                </div>
            </div>

            <!-- AI News & Insight Card (Wide) -->
            <div class="card panel-ai-insight">
                <h2><i class="fa-solid fa-wand-magic-sparkles"></i> Portfolio Analysis</h2>
                <div class="insight-content" id="portfolio-analysis-container">
                    <div class="ai-pill"><i class="fa-solid fa-robot"></i> Gemini AI</div>
                    <div style="color: var(--text-muted); text-align: center; padding: 2rem;">
                        <i class="fa-solid fa-spinner fa-spin"
                            style="font-size: 2rem; margin-bottom: 1rem; color: var(--accent-color);"></i>
                        <br>AI is analyzing your portfolio...
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log('StockMaster UI Loaded');

            // Add gentle 3D hover effects to cards matching the Portal style
            const cards = document.querySelectorAll('.card');

            cards.forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;

                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;

                    const rotateX = ((y - centerY) / centerY) * -3;
                    const rotateY = ((x - centerX) / centerX) * 3;

                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.01)`;
                    card.style.transition = 'none'; // remove transition for smooth tracking
                });

                card.addEventListener('mouseleave', () => {
                    card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1)';
                    card.style.transition = 'all 0.4s ease'; // restore transition when leaving
                });
            });

            // Polling data functionality
            async function fetchMarketData() {
                try {
                    const res = await fetch('/StockMaster_01/api/market-indices');
                    const data = await res.json();

                    const container = document.getElementById('market-indices-container');
                    container.innerHTML = ''; // clear

                    data.forEach(item => {
                        const isUpStr = item.is_up ? 'positive' : 'negative';
                        const signStr = item.is_up ? '+' : '';
                        const iconStr = item.is_up ? 'fa-arrow-trend-up' : 'fa-arrow-trend-down';
                        const changeStr = item.price === "N/A" || item.price === "Error" ? 'N/A' : `${signStr}${item.change}% <i class="fa-solid ${iconStr}"></i>`;
                        const priceStr = item.price === "N/A" || item.price === "Error" ? item.price : `${item.currency}${item.price}`;

                        container.innerHTML += `
                            <div class="index-item ${isUpStr}">
                                <span class="index-name">${item.name}</span>
                                <span class="index-value">${priceStr}</span>
                                <span class="index-change">${changeStr}</span>
                            </div>
                        `;
                    });
                } catch (e) {
                    console.error("Failed to fetch market data", e);
                }
            }

            async function fetchWatchlistData() {
                try {
                    const res = await fetch('/StockMaster_01/api/watchlist');
                    const data = await res.json();

                    const container = document.getElementById('watchlist-container');
                    container.innerHTML = ''; // clear

                    data.forEach(item => {
                        const isUpStr = item.is_up ? 'positive' : 'negative';
                        const signStr = item.change > 0 ? '+' : '';
                        const changeStr = item.price === "N/A" || item.price === "Error" ? 'N/A' : `${signStr}${item.change}%`;
                        const priceStr = item.price === "N/A" || item.price === "Error" ? item.price : `${item.currency}${item.price}`;

                        container.innerHTML += `
                            <div class="stock-row">
                                <div class="stock-info">
                                    <span class="stock-ticker">${item.name}</span>
                                    <span class="stock-company">${item.ticker}</span>
                                </div>
                                <div style="display: flex; align-items: center;">
                                    <div class="stock-numbers ${isUpStr}">
                                        <span class="price">${priceStr}</span>
                                        <span class="change">${changeStr}</span>
                                    </div>
                                    <button class="btn-remove" onclick="removeStock('${item.ticker.replace(".KS", "")}')" title="Remove"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            </div>
                        `;
                    });
                } catch (e) {
                    console.error("Failed to fetch watchlist data", e);
                }
            }

            async function fetchPortfolioAnalysis() {
                try {
                    const container = document.getElementById('portfolio-analysis-container');

                    const res = await fetch('/StockMaster_01/api/portfolio-analysis');
                    const data = await res.json();

                    if (data.success) {
                        let htmlContent = data.analysis.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                        htmlContent = htmlContent.replace(/\n\n/g, '</p><p class="insight-text" style="color: var(--text-main);">');
                        htmlContent = htmlContent.replace(/\n/g, '<br>');

                        container.innerHTML = `
                            <div class="ai-pill"><i class="fa-solid fa-robot"></i> Gemini AI</div>
                            <h3 class="insight-title">Current Portfolio Status & Outlook</h3>
                            <p class="insight-text" style="color: var(--text-main);">${htmlContent}</p>
                        `;
                    } else if (data.error) {
                        container.innerHTML = `
                            <div class="ai-pill"><i class="fa-solid fa-robot"></i> Gemini AI</div>
                            <p class="insight-text" style="color: var(--negative-color);">Error: ${data.error}</p>
                        `;
                    }
                } catch (e) {
                    console.error("Failed to fetch portfolio analysis", e);
                }
            }

            // Initialization and setup interval
            fetchMarketData();
            fetchWatchlistData();
            fetchPortfolioAnalysis();
            setInterval(() => {
                fetchMarketData();
                fetchWatchlistData();
            }, 60000); // 1 minute refresh period

            // Watchlist Add/Remove interactions
            const addForm = document.getElementById('add-form');
            const tickerInput = document.getElementById('input-ticker');
            const nameInput = document.getElementById('input-name');

            document.getElementById('btn-toggle-add').addEventListener('click', () => {
                addForm.classList.toggle('active');
            });

            document.getElementById('btn-cancel-add').addEventListener('click', () => {
                addForm.classList.remove('active');
                tickerInput.value = '';
                nameInput.value = '';
            });

            document.getElementById('btn-save-stock').addEventListener('click', async () => {
                const ticker = tickerInput.value;
                const name = nameInput.value;
                if (!ticker || !name) {
                    alert('Please enter both ticker and company name.');
                    return;
                }

                try {
                    const res = await fetch('/StockMaster_01/api/watchlist', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ticker, name })
                    });
                    const data = await res.json();
                    if (data.success) {
                        addForm.classList.remove('active');
                        tickerInput.value = '';
                        nameInput.value = '';

                        document.getElementById('watchlist-container').innerHTML = '<div style="color: var(--text-muted); text-align: center; padding: 1rem;">Updating...</div>';
                        fetchWatchlistData();
                        fetchPortfolioAnalysis(); // Re-analyze on new stock added
                    } else {
                        alert('Error: ' + data.error);
                    }
                } catch (e) {
                    console.error("Failed to add stock", e);
                }
            });

            window.removeStock = async function (rawTicker) {
                // If the stock is korean, we need to append .KS for DB removal if we striped it, BUT our UI strips it before rendering.
                // Wait, in fetch_stock_data, we return stripped ticker in UI. We should delete using full ticker...
                // Actually it's easier to just issue DELETE and let backend handle it, but wait: backend returns .replace('.KS', '') for the ID.
                // It's safer if backend returns the original ticker as `id` or `raw_ticker`.
                if (!confirm("Are you sure you want to remove this stock?")) return;

                try {
                    const res = await fetch(`/StockMaster_01/api/watchlist/${rawTicker}`, { method: 'DELETE' });
                    const data = await res.json();
                    if (data.success) {
                        document.getElementById('watchlist-container').innerHTML = '<div style="color: var(--text-muted); text-align: center; padding: 1rem;">Updating...</div>';
                        fetchWatchlistData();
                        fetchPortfolioAnalysis(); // Re-analyze after removal
                    }
                } catch (e) {
                    console.error("Failed to remove stock", e);
                }
            };
        });
    </script>
</body>

</html>
