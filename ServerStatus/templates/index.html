<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --accent-color: #10b981;
            /* 녹색 */
            --warning-color: #f59e0b;
            /* 노란색 */
            --danger-color: #ef4444;
            /* 빨간색 */
            --text-muted: #a1a1aa;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        h1 {
            margin-bottom: 2rem;
            font-weight: 700;
        }

        /* 메트릭 바 스타일 */
        .metric-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .metric-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .metric-item {
            margin-bottom: 0.8rem;
        }

        .label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.3rem;
            font-size: 1rem;
        }

        .bar-bg {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            background: var(--accent-color);
            /* 기본 녹색 */
            width: 0%;
            transition: width 0.5s ease, background-color 0.3s ease;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
        }

        /* 임계값 색상 */
        .bar-fill.yellow {
            background: var(--warning-color);
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.3);
        }

        .bar-fill.red {
            background: var(--danger-color);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
        }

        /* 정보 그리드 - 아이콘 포함 스타일 */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
            text-align: left;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 10px;
            /* 원래 스타일에는 테두리가 없지만, 배경 추가함 */
        }

        .info-title {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 0.2rem;
            display: flex;
            align-items: center;
        }

        .info-title i {
            margin-right: 0.5rem;
            color: var(--accent-color);
        }

        .info-value {
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 0.2rem;
        }

        .net-up {
            color: var(--danger-color);
        }

        .net-down {
            color: var(--accent-color);
        }

        /* 모바일 반응형 */
        @media (max-width: 600px) {
            .container {
                border: none;
                background: transparent;
                padding: 0;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1><i class="fa-solid fa-server"></i> Server Status</h1>

        <!-- 리소스 섹션 -->
        <div class="metric-group">
            <div class="metric-title">System Resources</div>

            <!-- CPU 전체 -->
            <div class="metric-item">
                <div class="label">
                    <span><i class="fa-solid fa-microchip"></i> CPU</span>
                    <span id="cpu-val">0%</span>
                </div>
                <div class="bar-bg">
                    <div class="bar-fill" id="cpu-bar"></div>
                </div>
            </div>

            <!-- 메모리 -->
            <div class="metric-item">
                <div class="label">
                    <span><i class="fa-solid fa-memory"></i> Memory</span>
                    <span id="mem-val">0%</span>
                </div>
                <div class="bar-bg">
                    <div class="bar-fill" id="mem-bar"></div>
                </div>
            </div>

            <!-- C 드라이브 -->
            <div class="metric-item">
                <div class="label">
                    <span><i class="fa-solid fa-hard-drive"></i> Disk (C:)</span>
                    <span id="disk-c-val">0%</span>
                </div>
                <div class="bar-bg">
                    <div class="bar-fill" id="disk-c-bar"></div>
                </div>
            </div>

            <!-- D 드라이브 -->
            <div class="metric-item">
                <div class="label">
                    <span><i class="fa-solid fa-server"></i> Disk (D:)</span>
                    <span id="disk-d-val">N/A</span>
                </div>
                <div class="bar-bg">
                    <div class="bar-fill" id="disk-d-bar"></div>
                </div>
            </div>
        </div>

        <!-- 정보 그리드 (가동시간 & 네트워크) -->
        <div class="info-grid">
            <div class="info-item">
                <div class="info-title"><i class="fa-solid fa-clock"></i> Uptime</div>
                <div class="info-value" id="uptime">Loading...</div>
            </div>
            <div class="info-item">
                <div class="info-title"><i class="fa-solid fa-network-wired"></i> Network</div>
                <div class="info-value" id="network">Calculating...</div>
            </div>
        </div>
    </div>

    <script>
        let lastNet = null;
        let lastTime = Date.now();

        function formatSpeed(bytes) {
            const kbps = (bytes * 8) / 1000;
            return kbps.toFixed(2) + " kbps";
        }

        // 바 업데이트 헬퍼 함수
        // forcePercent: 값이 텍스트일 때 퍼센트 강제 지정
        function updateBar(valId, barId, value, unit = "", max = 100, forcePercent = null) {
            const elemVal = document.getElementById(valId);
            const elemBar = document.getElementById(barId);

            if (value === null || value === undefined || value === 'N/A') {
                elemVal.textContent = "N/A";
                elemBar.style.width = "0%";
                elemBar.className = "bar-fill"; // Reset
                return;
            }

            // If value is a string with something like "45.5 W", parse it for color,
            // but use forcePercent for bar width if provided.
            let numValue = parseFloat(value);
            if (isNaN(numValue)) numValue = 0;

            elemVal.textContent = value + (isNaN(value) ? "" : unit);

            let pct = forcePercent !== null ? forcePercent : (numValue / max) * 100;
            if (pct > 100) pct = 100;

            elemBar.style.width = pct + "%";

            // Threshold Colors
            elemBar.className = "bar-fill"; // Reset base class
            if (pct > 90) {
                elemBar.classList.add("red");
            } else if (pct > 60) {
                elemBar.classList.add("yellow");
            }
        }

        async function fetchStatus() {
            try {
                const response = await fetch('api/status');
                const data = await response.json();

                // 1. CPU 전체
                updateBar('cpu-val', 'cpu-bar', data.cpu, '%');

                // 2. 시스템 리소스 (메모리)
                updateBar('mem-val', 'mem-bar', data.memory.percent, '%');

                // C 드라이브
                if (data.disk_c) {
                    const text = `${data.disk_c.used} / ${data.disk_c.total}`;
                    updateBar('disk-c-val', 'disk-c-bar', text, "", 100, data.disk_c.percent);
                } else {
                    updateBar('disk-c-val', 'disk-c-bar', 'N/A');
                }

                // D 드라이브
                if (data.disk_d) {
                    const text = `${data.disk_d.used} / ${data.disk_d.total}`;
                    updateBar('disk-d-val', 'disk-d-bar', text, "", 100, data.disk_d.percent);
                } else {
                    updateBar('disk-d-val', 'disk-d-bar', 'N/A');
                }

                // 4. Uptime
                document.getElementById('uptime').textContent = data.uptime;

                // 5. Network
                const now = Date.now();
                if (lastNet) {
                    const duration = (now - lastTime) / 1000;
                    if (duration > 0) {
                        const downSpeed = (data.network.bytes_recv - lastNet.bytes_recv) / duration;
                        const upSpeed = (data.network.bytes_sent - lastNet.bytes_sent) / duration;

                        document.getElementById('network').innerHTML =
                            `<div><span class="net-down">↓ ${formatSpeed(downSpeed)}</span></div>` +
                            `<div><span class="net-up">↑ ${formatSpeed(upSpeed)}</span></div>`;
                    }
                }
                lastNet = data.network;
                lastTime = now;

            } catch (error) {
                console.error('Fetch error:', error);
            }
        }

        setInterval(fetchStatus, 2000);
        fetchStatus();
    </script>
</body>

</html>
