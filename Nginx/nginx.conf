server {
    listen       80;
    server_name  localhost;

    # 메인 대시보드 (Index)
    location / {
        proxy_pass http://host.docker.internal:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ServerStatus 대시보드
    location /ServerStatus/ {
        proxy_pass http://host.docker.internal:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }



    # ImageAnalyzer (Port 5000)
    location /ImageAnalyzer/ {
        proxy_pass http://host.docker.internal:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # 비디오 분석을 위한 타임아웃 시간 증가
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
    }

    # YoutubeToDoc (Port 8083)
    location /YoutubeToDoc/ {
        proxy_pass http://host.docker.internal:8083/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # StockMaster (Port 8050)
    location /StockMaster_01/ {
        proxy_pass http://host.docker.internal:8050/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
